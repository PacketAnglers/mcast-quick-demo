---
name: mcast-quick-demo
prefix: ""

mgmt:
  network: custom_mgmt
  ipv4-subnet: 172.100.100.0/24

topology:

  defaults:
    env:
      INTFTYPE: et
    kind: arista_ceos

  kinds:
    arista_ceos:
      image: arista/ceos:latest
    linux:
      image: ghcr.io/aristanetworks/aclabs/host-ubuntu:rev1.1

  nodes:
    ceos1:
      startup-config: init-configs/clab-mcast-quick-demo/ceos1/startup_config

    ceos2:
      startup-config: init-configs/clab-mcast-quick-demo/ceos2/startup_config

    ceos3:
      startup-config: init-configs/clab-mcast-quick-demo/ceos3/startup_config

    ceos4:
      startup-config: init-configs/clab-mcast-quick-demo/ceos4/startup_config

    host1:
      kind: linux
      env:
        IPV4: 10.10.10.101/24
        IPV6: 2001:db8:10:10::101/64
        STATIC_ROUTE: 10.0.0.0/8
        GW: 10.10.10.1
        UPLINK_MAC: 00:01:01:00:00:01

    host2:
      kind: linux
      env:
        IPV4: 10.20.20.101/24
        IPV6: 2001:db8:20:20::102/64
        STATIC_ROUTE: 10.0.0.0/8
        GW: 10.20.20.1
        UPLINK_MAC: 00:01:01:00:00:02

    host3:
      kind: linux
      env:
        IPV4: 10.30.30.103/24
        IPV6: 2001:db8:30:30::103/64
        STATIC_ROUTE: 10.0.0.0/8
        GW: 10.30.30.1
        UPLINK_MAC: 00:01:01:00:00:03

  links:
    - endpoints: [ "ceos1:et1", "ceos2:et1" ]
    - endpoints: [ "ceos2:et2", "ceos3:et1" ]
    - endpoints: [ "ceos4:et1", "ceos2:et3" ]
    - endpoints: [ "host1:eth1", "ceos1:et2" ]
    - endpoints: [ "host2:eth1", "ceos3:et2" ]
    - endpoints: [ "host3:eth1", "ceos3:et3" ]
